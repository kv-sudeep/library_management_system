<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Kishkinda University Library</title>
<meta http-equiv="refresh" content="0; url=login.html"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'DM Sans',sans-serif;
    background:#f4f2ed;
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;
  }
  .wrap{text-align:center}
  .emblem{
    width:64px;height:64px;border-radius:16px;
    background:linear-gradient(135deg,#1a1a1a,#333);
    display:flex;align-items:center;justify-content:center;
    font-size:28px;margin:0 auto 16px;
    box-shadow:0 8px 28px rgba(0,0,0,.2);
  }
  p{color:#888;font-size:13px;letter-spacing:.5px}
  a{color:#1a1a1a;text-decoration:underline}
</style>
</head>
<body>
<div class="wrap">
  <div class="emblem">📚</div>
  <p>Redirecting to Kishkinda University Library…</p>
  <p style="margin-top:8px"><a href="login.html">Click here</a> if you are not redirected automatically.</p>
</div>
<script>
  // Session-aware redirect: send logged-in users straight to their dashboard
  try {
    const user = JSON.parse(localStorage.getItem('kul_user'));
    const token = localStorage.getItem('kul_token');
    if (user && token) {
      window.location.replace((user.role === 'admin' || user.role === 'librarian') ? 'dashboard.html' : 'member.html');
    } else {
      window.location.replace('login.html');
    }
  } catch {
    window.location.replace('login.html');
  }
</script>
</body>
</html>
