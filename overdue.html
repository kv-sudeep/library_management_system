<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Overdue — Kishkinda University Library</title>
<link rel="stylesheet" href="styles.css"/>
<script src="i18n.js"></script><script src="api.js"></script><script src="components.js"></script>
</head>
<body>
<div class="layout">
  <div id="sbWrap"></div>
  <div class="main" id="mainWrap">
    <div id="tbWrap"></div>
    <div class="page">
      <div class="ph"><h2>Overdue Books</h2><p id="ovCount">Loading…</p></div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Member</th><th>Book</th><th>Due Date</th><th>Days Overdue</th><th>Fine (est.)</th><th>Action</th></tr></thead>
          <tbody id="ovBody"><tr><td colspan="6"><div class="ldr"><div class="spin"></div></div></td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<div id="cbWrap"></div>

<script>
const u = API.guard('staff'); if(!u) throw '';
document.getElementById('sbWrap').innerHTML = KUL.sidebar(u,'overdue.html');
document.getElementById('tbWrap').innerHTML = KUL.topbar('Overdue Books', u);
document.getElementById('cbWrap').innerHTML = KUL.chatbot();
KUL.initOutsideClick(); KUL.loadNotifications();

async function load(){
  const data = await API.get('/transactions/overdue');
  const list = Array.isArray(data)?data:[];
  document.getElementById('ovCount').textContent = `${list.length} books past due date`;
  document.getElementById('ovBody').innerHTML = list.length===0
    ? `<tr><td colspan="6">${KUL.empty('🎉','No overdue books!','All borrowed books are within their due dates')}</td></tr>`
    : list.map(t=>{
      const days = Math.max(0, Math.floor((Date.now()-new Date(t.due_date))/86400000));
      return `<tr>
        <td style="font-weight:600;font-size:13px">${t.user?.full_name||t.user?.username||'—'}</td>
        <td style="font-weight:600;font-size:13px;max-width:200px">${t.book?.title||'—'}</td>
        <td style="font-size:13px;color:var(--muted)">${KUL.date(t.due_date)}</td>
        <td style="font-weight:700;color:#dc2626;font-size:13px">${days} days</td>
        <td style="font-weight:700;color:#dc2626;font-size:13px">$${(days*2).toFixed(2)}</td>
        <td><button class="btn btn-ghost btn-xs" onclick="processReturn(${t.id})">Process Return</button></td>
      </tr>`;
    }).join('');
}
async function processReturn(id){
  const r = await API.post(`/transactions/return/${id}`,{});
  if(r.error) API.toast(r.error,'error'); else { API.toast('Processed!','success'); load(); }
}
load();
</script>
</body></html>
